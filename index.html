<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>微信头像框生成器</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src * 'unsafe-inline'; script-src * 'unsafe-inline'; img-src * data: blob:; font-src * data:; media-src * data: blob:; connect-src 'none'; form-action 'none'; frame-src 'none'; object-src 'none'; base-uri 'none'">
    <script src="https://image.uc.cn/s/uae/g/3n/mos-production/fontawesome-free-7.1.0-web/js/all.min.js"></script>
    <link href="https://image.uc.cn/s/uae/g/3n/mos-production/fontawesome-free-7.1.0-web/css/fontawesome.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #07c160;
            --primary-hover: #06ad56;
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #888888;
            --border-color: #e0e0e0;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --radius: 12px;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background-color: var(--card-bg);
            padding: 1rem 1.5rem;
            text-align: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header h1 { font-size: 1.25rem; font-weight: 600; color: var(--text-main); }
        header p { font-size: 0.875rem; color: var(--text-sub); margin-top: 0.25rem; }
        
        main {
            flex: 1;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            padding: 1.5rem;
        }
        .main-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            padding: 1.5rem;
        }
        .section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
        .section-title i { color: var(--primary-color); }
        
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: var(--radius);
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #fafafa;
        }
        .upload-area:hover, .upload-area.drag-over {
            border-color: var(--primary-color);
            background-color: rgba(7, 193, 96, 0.05);
        }
        .upload-icon { font-size: 2.5rem; color: var(--text-sub); margin-bottom: 1rem; }
        .upload-text { font-size: 0.95rem; color: var(--text-main); margin-bottom: 0.5rem; }
        .upload-hint { font-size: 0.8rem; color: var(--text-sub); }
        #file-input { display: none; }
        
        .frames-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        .frame-option {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
            background-color: #f0f0f0;
            text-align: center;
        }
        .frame-option img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
        }
        .frame-option:hover { transform: translateY(-2px); }
        .frame-option.selected {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(7, 193, 96, 0.2);
        }
        .frame-option.selected::after {
            content: '\f00c';
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--primary-color);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            z-index: 2;
        }
        .frame-name {
            font-size: 0.75rem;
            padding: 6px 4px 4px;
            color: var(--text-main);
            background: rgba(255,255,255,0.9);
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        
        .preview-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #fafafa;
            border-radius: var(--radius);
            padding: 1rem;
        }
        canvas {
            max-width: 100%;
            max-height: 400px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            background-image: url('data:image/svg+xml;utf8,<svg width="20" height="20" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="10" height="10" fill="%23eee"/><rect x="10" y="10" width="10" height="10" fill="%23eee"/></svg>');
            cursor: grab;
            -webkit-touch-callout: default;  /* 允许长按保存 */
        }
        canvas:active { cursor: grabbing; }
        
        /* 保存提示 */
        .save-hint {
            margin-top: 0.8rem;
            font-size: 0.8rem;
            color: var(--primary-color);
            background: rgba(7, 193, 96, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            display: inline-block;
        }
        
        .transform-controls {
            margin-top: 1rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            background: #f8f8f8;
            padding: 0.8rem;
            border-radius: 8px;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .slider-container label {
            font-size: 0.85rem;
            color: var(--text-sub);
            min-width: 50px;
        }
        input[type="range"] {
            flex: 1;
            min-width: 120px;
            height: 4px;
            -webkit-appearance: none;
            background: var(--border-color);
            border-radius: 2px;
        }
        input[type="range"]:focus { outline: none; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
        }
        .reset-btn {
            background: white;
            border: 1px solid var(--border-color);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .reset-btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        .help-text {
            font-size: 0.7rem;
            color: var(--text-sub);
            text-align: center;
        }
        
        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { background: rgba(220, 53, 69, 0.9); }
        .toast.success { background: rgba(7, 193, 96, 0.9); }
        
        @media (max-width: 480px) {
            .frames-grid { grid-template-columns: repeat(2, 1fr); }
            main { padding: 1rem; }
        }
    </style>
</head>
<body>
<header>
    <h1>微信头像框生成器</h1>
    <p>上传头像，选择边框，并可拖拽 / 缩放头像位置</p>
</header>
<main>
    <div class="main-card">
        <!-- 步骤1: 上传头像 -->
        <div class="section">
            <div class="section-title"><i class="fa-solid fa-cloud-arrow-up"></i><span>1. 上传头像</span></div>
            <div class="upload-area" id="upload-zone">
                <input type="file" id="file-input" accept="image/png, image/jpeg, image/jpg, image/webp">
                <div class="upload-icon"><i class="fa-regular fa-image"></i></div>
                <div class="upload-text">点击或拖拽图片到此处</div>
                <div class="upload-hint">支持 JPG, PNG, WEBP (最大10MB)</div>
            </div>
        </div>

        <!-- 步骤2: 选择头像框 -->
        <div class="section">
            <div class="section-title"><i class="fa-solid fa-border-all"></i><span>2. 选择头像框</span></div>
            <div class="frames-grid" id="frames-container"></div>
        </div>

        <!-- 步骤3: 预览与调整 -->
        <div class="section">
            <div class="section-title"><i class="fa-solid fa-eye"></i><span>3. 预览与保存</span></div>
            <div class="preview-area">
                <canvas id="preview-canvas" width="640" height="640"></canvas>
                <div class="save-hint">
                    <i class="fa-regular fa-hand-pointer"></i> 💡 长按图片保存到手机 / 右键保存到电脑
                </div>
            </div>
            <div class="transform-controls" id="transform-controls" style="display: none;">
                <div class="slider-container">
                    <label><i class="fa-solid fa-magnifying-glass"></i> 缩放</label>
                    <input type="range" id="zoom-slider" min="0.5" max="2.0" step="0.01" value="1.0">
                    <button class="reset-btn" id="reset-transform-btn"><i class="fa-solid fa-rotate-left"></i> 重置</button>
                </div>
                <div class="help-text"><i class="fa-regular fa-hand-pointer"></i> 提示：在预览图上直接拖拽可移动头像</div>
            </div>
        </div>
    </div>
</main>
<div id="toast-container"></div>

<script>
    const CONFIG = {
        canvasSize: 640,
        maxFileSize: 10 * 1024 * 1024,
        allowedTypes: ['image/jpeg', 'image/png', 'image/webp', 'image/jpg'],
        frames: [
            { id: 'spring', name: '繁花携春', url: 'frames/spring.png' },
            { id: 'summer', name: '紫藤迎夏', url: 'frames/summer.png' },
            { id: 'autumn', name: '金风染秋', url: 'frames/autumn.png' },
            { id: 'winter', name: '晴雪伴冬', url: 'frames/winter.png' }
        ]
    };

    const state = {
        userImage: null,
        selectedFrameIndex: 0,
        frameImages: [],
        scale: 1.0,
        offsetX: 0,
        offsetY: 0,
        isDragging: false,
        dragStartX: 0,
        dragStartY: 0,
        dragStartOffsetX: 0,
        dragStartOffsetY: 0
    };

    const els = {
        uploadZone: document.getElementById('upload-zone'),
        fileInput: document.getElementById('file-input'),
        framesContainer: document.getElementById('frames-container'),
        canvas: document.getElementById('preview-canvas'),
        toastContainer: document.getElementById('toast-container'),
        transformControls: document.getElementById('transform-controls'),
        zoomSlider: document.getElementById('zoom-slider'),
        resetBtn: document.getElementById('reset-transform-btn')
    };
    const ctx = els.canvas.getContext('2d');

    function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        let icon = '';
        if (type === 'success') icon = '<i class="fa-solid fa-check-circle"></i>';
        else if (type === 'error') icon = '<i class="fa-solid fa-circle-exclamation"></i>';
        else icon = '<i class="fa-solid fa-circle-info"></i>';
        toast.innerHTML = `${icon}<span>${message}</span>`;
        els.toastContainer.appendChild(toast);
        requestAnimationFrame(() => toast.classList.add('show'));
        setTimeout(() => {
            toast.classList.remove('show');
            toast.addEventListener('transitionend', () => toast.remove());
        }, 3000);
    }

    function preloadFrameImages() {
        const promises = CONFIG.frames.map(frame => {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = () => {
                    console.warn(`边框图片加载失败: ${frame.url}`);
                    resolve(null);
                };
                img.src = frame.url;
            });
        });
        return Promise.all(promises).then(images => {
            state.frameImages = images;
        });
    }

    function getAvatarDrawParams() {
        const img = state.userImage;
        const S = CONFIG.canvasSize;
        const baseScale = Math.max(S / img.width, S / img.height);
        const totalScale = baseScale * state.scale;
        const drawW = img.width * totalScale;
        const drawH = img.height * totalScale;
        let drawX = (S - drawW) / 2 + state.offsetX;
        let drawY = (S - drawH) / 2 + state.offsetY;
        return { drawX, drawY, drawW, drawH };
    }

    function drawCanvas() {
        ctx.clearRect(0, 0, CONFIG.canvasSize, CONFIG.canvasSize);
        if (state.userImage) {
            const { drawX, drawY, drawW, drawH } = getAvatarDrawParams();
            ctx.drawImage(state.userImage, drawX, drawY, drawW, drawH);
        } else {
            ctx.fillStyle = '#eeeeee';
            ctx.fillRect(0, 0, CONFIG.canvasSize, CONFIG.canvasSize);
            ctx.fillStyle = '#999999';
            ctx.font = '24px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('预览区域', CONFIG.canvasSize / 2, CONFIG.canvasSize / 2);
        }
        const frameImg = state.frameImages[state.selectedFrameIndex];
        if (frameImg && frameImg.complete && frameImg.naturalWidth > 0) {
            ctx.drawImage(frameImg, 0, 0, CONFIG.canvasSize, CONFIG.canvasSize);
        }
    }

    function resetTransform() {
        state.scale = 1.0;
        state.offsetX = 0;
        state.offsetY = 0;
        if (els.zoomSlider) els.zoomSlider.value = '1.0';
        drawCanvas();
        showToast('已重置头像位置', 'success');
    }

    function setScale(value) {
        state.scale = parseFloat(value);
        drawCanvas();
    }

    // 拖拽移动头像
    function onMouseDown(e) {
        if (!state.userImage) return;
        e.preventDefault();
        const rect = els.canvas.getBoundingClientRect();
        const scaleX = els.canvas.width / rect.width;
        const scaleY = els.canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        const canvasX = (clientX - rect.left) * scaleX;
        const canvasY = (clientY - rect.top) * scaleY;
        state.isDragging = true;
        state.dragStartX = canvasX;
        state.dragStartY = canvasY;
        state.dragStartOffsetX = state.offsetX;
        state.dragStartOffsetY = state.offsetY;
        els.canvas.style.cursor = 'grabbing';
    }

    function onMouseMove(e) {
        if (!state.isDragging || !state.userImage) return;
        e.preventDefault();
        const rect = els.canvas.getBoundingClientRect();
        const scaleX = els.canvas.width / rect.width;
        const scaleY = els.canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        const canvasX = (clientX - rect.left) * scaleX;
        const canvasY = (clientY - rect.top) * scaleY;
        let dx = canvasX - state.dragStartX;
        let dy = canvasY - state.dragStartY;
        state.offsetX = state.dragStartOffsetX + dx;
        state.offsetY = state.dragStartOffsetY + dy;
        drawCanvas();
    }

    function onMouseUp(e) {
        if (!state.isDragging) return;
        state.isDragging = false;
        els.canvas.style.cursor = 'grab';
    }

    function initDragEvents() {
        els.canvas.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
        els.canvas.addEventListener('touchstart', onMouseDown, { passive: false });
        window.addEventListener('touchmove', onMouseMove, { passive: false });
        window.addEventListener('touchend', onMouseUp);
        els.canvas.style.cursor = 'grab';
    }

    function renderFrames() {
        els.framesContainer.innerHTML = '';
        CONFIG.frames.forEach((frame, index) => {
            const div = document.createElement('div');
            div.className = `frame-option ${index === state.selectedFrameIndex ? 'selected' : ''}`;
            div.innerHTML = `
                <img src="${frame.url}" alt="${frame.name}" loading="lazy">
                <div class="frame-name">${frame.name}</div>
            `;
            div.onclick = () => selectFrame(index);
            els.framesContainer.appendChild(div);
        });
    }

    function selectFrame(index) {
        state.selectedFrameIndex = index;
        document.querySelectorAll('.frame-option').forEach((opt, i) => {
            if (i === index) opt.classList.add('selected');
            else opt.classList.remove('selected');
        });
        drawCanvas();
    }

    function processFile(file) {
        if (!CONFIG.allowedTypes.includes(file.type)) {
            showToast('不支持的图片格式，请上传 JPG, PNG 或 WEBP', 'error');
            return;
        }
        if (file.size > CONFIG.maxFileSize) {
            showToast('图片大小不能超过 10MB', 'error');
            return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                state.userImage = img;
                resetTransform();
                els.transformControls.style.display = 'flex';
                drawCanvas();
                showToast('头像上传成功，可拖拽/缩放调整', 'success');
            };
            img.onerror = () => showToast('图片加载失败', 'error');
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function setupUploadListeners() {
        els.uploadZone.addEventListener('click', () => els.fileInput.click());
        els.fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) processFile(e.target.files[0]);
        });
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => {
            els.uploadZone.addEventListener(ev, (e) => { e.preventDefault(); e.stopPropagation(); });
        });
        ['dragenter', 'dragover'].forEach(ev => {
            els.uploadZone.addEventListener(ev, () => els.uploadZone.classList.add('drag-over'));
        });
        ['dragleave', 'drop'].forEach(ev => {
            els.uploadZone.addEventListener(ev, () => els.uploadZone.classList.remove('drag-over'));
        });
        els.uploadZone.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            if (files.length) processFile(files[0]);
        });
    }

    async function init() {
        renderFrames();
        await preloadFrameImages();
        drawCanvas();
        setupUploadListeners();
        initDragEvents();
        if (els.zoomSlider) {
            els.zoomSlider.addEventListener('input', (e) => setScale(e.target.value));
        }
        if (els.resetBtn) {
            els.resetBtn.addEventListener('click', resetTransform);
        }
        els.transformControls.style.display = 'none';
    }
    init();
</script>
</body>
</html>
